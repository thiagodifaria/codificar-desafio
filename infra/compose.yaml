name: codificar-chamados

services:
  database:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chamados}
      POSTGRES_USER: ${POSTGRES_USER:-chamados}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chamados}
    volumes:
      - postgres-data:/var/lib/postgresql
      - ../service-api/service-postgresql:/database:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chamados} -d ${POSTGRES_DB:-chamados}"]
      interval: 3s
      timeout: 3s
      retries: 15
    restart: unless-stopped

  migrate:
    image: postgres:18-alpine
    depends_on:
      database:
        condition: service_healthy
    environment:
      PGHOST: database
      PGDATABASE: ${POSTGRES_DB:-chamados}
      PGUSER: ${POSTGRES_USER:-chamados}
      PGPASSWORD: ${POSTGRES_PASSWORD:-chamados}
    volumes:
      - ../service-api/service-postgresql:/database:ro
    command: ["sh", "/database/migrate.sh"]
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: service-api/service-golang/Dockerfile
    environment:
      APP_PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-chamados}:${POSTGRES_PASSWORD:-chamados}@database:5432/${POSTGRES_DB:-chamados}?sslmode=disable
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: client-web/Dockerfile
    ports:
      - "${WEB_PORT:-3000}:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres-data:
